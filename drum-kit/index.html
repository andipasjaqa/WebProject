<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drum Kit</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Press keys to play drums!</h1>
<div class="drums">
  <div class="drum" data-key="65"><kbd>A</kbd><span>Clap</span></div>
  <div class="drum" data-key="83"><kbd>S</kbd><span>HiHat</span></div>
  <div class="drum" data-key="68"><kbd>D</kbd><span>Kick</span></div>
  <div class="drum" data-key="70"><kbd>F</kbd><span>Snare</span></div>
  <div class="drum" data-key="71"><kbd>G</kbd><span>Tom</span></div>
  <div class="drum" data-key="72"><kbd>H</kbd><span>Crash</span></div>
  <div class="drum" data-key="74"><kbd>J</kbd><span>Ride</span></div>
  <div class="drum" data-key="75"><kbd>K</kbd><span>Open Hat</span></div>
</div>
<audio data-key="65" src="https://s3.amazonaws.com/freecodecamp/drums/Heater-1.mp3"></audio>
<audio data-key="83" src="https://s3.amazonaws.com/freecodecamp/drums/Heater-3.mp3"></audio>
<audio data-key="68" src="https://s3.amazonaws.com/freecodecamp/drums/Heater-2.mp3"></audio>
<audio data-key="70" src="https://s3.amazonaws.com/freecodecamp/drums/Heater-4_1.mp3"></audio>
<audio data-key="71" src="https://s3.amazonaws.com/freecodecamp/drums/Heater-6.mp3"></audio>
<audio data-key="72" src="https://s3.amazonaws.com/freecodecamp/drums/Dsc_Oh.mp3"></audio>
<audio data-key="74" src="https://s3.amazonaws.com/freecodecamp/drums/Kick_n_Hat.mp3"></audio>
<audio data-key="75" src="https://s3.amazonaws.com/freecodecamp/drums/RP4_KICK_1.mp3"></audio>
<script src="script.js"></script>
</body>
</html>
